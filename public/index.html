<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disciplina — Gestion des procédures disciplinaires</title>
  <link rel="stylesheet" href="app.css" />
</head>

    <div class="sidebar-foot">
      <div id="api-status" class="api-status"></div>
      <div class="mvp-note">MVP — données de démonstration fictives</div>
    </div>
  </aside>

  <main id="main">
    <!-- rendu par app.js -->
  </main>

  <footer id="app-footer" class="app-footer">
    <span id="footer-api" class="footer-api"><span class="dot"></span> Vérification de la connexion API…</span>
    <span class="footer-sep">·</span>
    <span class="footer-note">Disciplina — assiste la procédure, ne remplace pas la validation humaine</span>
  </footer>

  <div id="toast" class="toast" hidden></div>
  <script src="app.js"></script>
</body>
</html>
